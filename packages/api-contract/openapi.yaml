          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowUpInput"
      responses:
        "202":
          description: Device-scoped follow-up command accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"
        "400":
