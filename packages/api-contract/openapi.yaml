openapi: 3.1.0
info:
  title: Codex Remote API Contract
  version: 0.1.0
  description: Control Plane-shaped contract shared by Web, Worker, Control Plane, and future iOS clients.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
paths:
  /devices:
    get:
      operationId: listDevices
      responses:
        "200":
          description: Devices visible to the current actor.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
  /projects:
    get:
      operationId: listRemoteProjects
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Remote projects visible to the current actor.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteProject"
  /conversations:
    get:
      operationId: listCodexConversations
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
        - name: projectId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Codex conversations visible to the current actor.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodexConversation"
  /v1/worker/health:
    get:
      operationId: getWorkerHealth
      responses:
        "200":
          description: Worker and app-server readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerHealth"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/AppServerUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/worker/capabilities:
    get:
      operationId: getWorkerCapabilities
      responses:
        "200":
          description: Read-only worker capabilities visible to the current actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerCapabilities"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/AppServerUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/worker/probe:
    get:
      operationId: getWorkerProbeSummary
      responses:
        "200":
          description: Latest worker-owned read-only probe summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerProbeSummary"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/AppServerUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/control-plane/health:
    get:
      operationId: getControlPlaneHealth
      responses:
        "200":
          description: Control Plane aggregation readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlPlaneHealth"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices:
    get:
      operationId: listControlPlaneDevices
      responses:
        "200":
          description: Configured devices visible through the Control Plane.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/projects:
    get:
      operationId: listControlPlaneProjects
      responses:
        "200":
          description: Projects visible through the Control Plane.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteProject"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/projects:
    get:
      operationId: listControlPlaneDeviceProjects
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Projects for a configured device.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteProject"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/DeviceNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/worker/health:
    get:
      operationId: getControlPlaneDeviceWorkerHealth
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Worker health for a configured device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerHealth"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/DeviceNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/worker/capabilities:
    get:
      operationId: getControlPlaneDeviceWorkerCapabilities
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Worker capabilities for a configured device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerCapabilities"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/DeviceNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/worker/probe:
    get:
      operationId: getControlPlaneDeviceWorkerProbeSummary
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Worker-owned read-only probe summary for a configured device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerProbeSummary"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/DeviceNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations:
    post:
      operationId: startControlPlaneDeviceConversation
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartConversationInput"
      responses:
        "202":
          description: Device-scoped start command accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/DeviceNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}:
    patch:
      operationId: renameControlPlaneDeviceConversation
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameConversationInput"
      responses:
        "200":
          description: Device-scoped conversation renamed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenConversationResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/open:
    post:
      operationId: openControlPlaneDeviceConversation
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationLifecycleInput"
      responses:
        "200":
          description: Device-scoped conversation opened.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenConversationResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/archive:
    post:
      operationId: archiveControlPlaneDeviceConversation
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationLifecycleInput"
      responses:
        "200":
          description: Device-scoped conversation archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenConversationResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/unarchive:
    post:
      operationId: unarchiveControlPlaneDeviceConversation
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationLifecycleInput"
      responses:
        "200":
          description: Device-scoped conversation unarchived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenConversationResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/timeline:
    get:
      operationId: getControlPlaneDeviceConversationTimeline
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device-scoped timeline snapshot for a single conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationTimeline"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/follow-up:
    post:
      operationId: followUpControlPlaneDeviceConversation
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowUpInput"
      responses:
        "202":
          description: Device-scoped follow-up command accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/turns/{turnId}/interrupt:
    post:
      operationId: interruptControlPlaneDeviceTurn
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: turnId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterruptTurnInput"
      responses:
        "202":
          description: Device-scoped interrupt command accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/turns/{turnId}/steer:
    post:
      operationId: steerControlPlaneDeviceTurn
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: turnId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SteerTurnInput"
      responses:
        "202":
          description: Device-scoped steer command accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/queued-messages:
    get:
      operationId: listControlPlaneQueuedConversationMessages
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Queued messages for a device-scoped conversation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationQueuedMessage"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
    post:
      operationId: queueControlPlaneConversationMessage
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueueConversationMessageInput"
      responses:
        "201":
          description: Message queued for the selected conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationQueuedMessage"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/queued-messages/{queuedMessageId}:
    delete:
      operationId: cancelControlPlaneQueuedConversationMessage
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: queuedMessageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Queued message canceled.
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/queued-messages/{queuedMessageId}/send:
    post:
      operationId: sendControlPlaneQueuedConversationMessage
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: queuedMessageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendQueuedConversationMessageInput"
      responses:
        "202":
          description: Queued message follow-up command accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/DeviceUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/devices/{deviceId}/conversations/{conversationId}/approvals:
    get:
      operationId: listControlPlaneDevicePendingApprovals
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device-scoped process-local pending approval snapshot for a conversation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingApproval"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
