openapi: 3.1.0
info:
  title: Codex Remote API Contract
  version: 0.1.0
  description: Control Plane-shaped contract shared by Web, Worker, Control Plane, and future iOS clients.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
paths:
  /devices:
    get:
      operationId: listDevices
      responses:
        "200":
          description: Devices visible to the current actor.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
  /projects:
    get:
      operationId: listRemoteProjects
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Remote projects visible to the current actor.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteProject"
  /conversations:
    get:
      operationId: listCodexConversations
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
        - name: projectId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Codex conversations visible to the current actor.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodexConversation"
  /conversations/{conversationId}/follow-up:
    post:
      operationId: followUpConversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowUpInput"
      responses:
        "202":
          description: Follow-up accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandAccepted"
  /v1/worker/health:
    get:
      operationId: getWorkerHealth
      responses:
        "200":
          description: Worker and app-server readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerHealth"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/AppServerUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/worker/capabilities:
    get:
      operationId: getWorkerCapabilities
      responses:
        "200":
          description: Read-only worker capabilities visible to the current actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerCapabilities"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/AppServerUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/worker/probe:
    get:
      operationId: getWorkerProbeSummary
      responses:
        "200":
          description: Latest worker-owned read-only probe summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerProbeSummary"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/AppServerUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/conversations:
    get:
      operationId: listWorkerConversations
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
        - name: projectId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Worker conversation list visible to the current actor.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodexConversation"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/AppServerUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
  /v1/conversations/{conversationId}/timeline:
    get:
      operationId: getConversationTimeline
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Timeline snapshot for a single conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationTimeline"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/ConversationNotFoundError"
        "408":
          $ref: "#/components/responses/RequestTimeoutError"
        "424":
          $ref: "#/components/responses/AppServerUnavailableError"
        "500":
          $ref: "#/components/responses/InternalWorkerError"
components:
  responses:
    BadRequestError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthorizedError:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: Caller is not allowed to access the requested worker resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConversationNotFoundError:
      description: The requested conversation timeline could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RequestTimeoutError:
      description: Worker request timed out before a stable response was produced.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    AppServerUnavailableError:
      description: Worker could not reach the local Codex app-server dependency.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalWorkerError:
      description: Worker hit an unexpected internal failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    DeviceConnectionStatus:
      type: string
      enum:
        - Connected
        - Not connected
    ConversationStatus:
      type: string
      enum:
        - running
        - waiting
        - done
        - failed
        - unknown
    TaskStatus:
      type: string
      enum:
        - in_progress
        - waiting
        - done
    DiffKind:
      type: string
      enum:
        - context
        - add
        - remove
    AppServerTransport:
      type: string
      enum:
        - loopbackWebSocket
        - stdio
        - unixSocket
    WorkerConnectionStatus:
      type: string
      enum:
        - connected
        - disconnected
        - degraded
        - unknown
    ConversationRuntimeStatus:
      type: string
      enum:
        - not_loaded
        - idle
        - running
        - waiting_approval
        - waiting_input
        - unknown
    LatestTurnStatus:
      type: string
      enum:
        - completed
        - interrupted
        - failed
        - unknown
    TurnStatus:
      type: string
      enum:
        - in_progress
        - completed
        - interrupted
        - failed
        - unknown
    TimelineItemsView:
      type: string
      enum:
        - summary
        - full
    TimelineSortDirection:
      type: string
      enum:
        - asc
        - desc
    ProbeFailureType:
      type: string
      enum:
        - skipped
        - precondition_missing
        - env_not_configured
        - assertion_failed
        - opt_in_required
        - approval_unavailable
    ProbeMode:
      type: string
      enum:
        - readOnly
        - full
    WorkerHealth:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - status
        - checkedAt
        - codexVersion
        - appServer
      properties:
        deviceId:
          type: string
        status:
          $ref: "#/components/schemas/WorkerConnectionStatus"
        checkedAt:
          type: string
        codexVersion:
          type:
            - string
            - "null"
        appServer:
          type: object
          additionalProperties: false
          required:
            - transport
            - readyz
          properties:
            transport:
              $ref: "#/components/schemas/AppServerTransport"
            readyz:
              type: boolean
    WorkerCapabilities:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - canReadProjects
        - canReadConversations
        - canReadTimeline
        - canRunReadOnlyProbe
        - appServerTransport
        - supportedSourceKinds
      properties:
        deviceId:
          type: string
        canReadProjects:
          type: boolean
        canReadConversations:
          type: boolean
        canReadTimeline:
          type: boolean
        canRunReadOnlyProbe:
          type: boolean
        appServerTransport:
          $ref: "#/components/schemas/AppServerTransport"
        supportedSourceKinds:
          type: array
          items:
            type: string
    ConversationTimelineTurn:
      type: object
      additionalProperties: false
      required:
        - id
        - status
        - startedAt
        - completedAt
        - durationMs
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/TurnStatus"
        startedAt:
          type:
            - number
            - "null"
        completedAt:
          type:
            - number
            - "null"
        durationMs:
          type:
            - number
            - "null"
    ConversationTimeline:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - conversationId
        - readStartedAt
        - readCompletedAt
        - snapshotRevision
        - runtimeStatus
        - latestTurnStatus
        - turns
      properties:
        deviceId:
          type: string
        conversationId:
          type: string
        projectId:
          type: string
        readStartedAt:
          type: string
        readCompletedAt:
          type: string
        snapshotRevision:
          type: string
        runtimeStatus:
          $ref: "#/components/schemas/ConversationRuntimeStatus"
        latestTurnStatus:
          $ref: "#/components/schemas/LatestTurnStatus"
        turns:
          type: array
          items:
            $ref: "#/components/schemas/ConversationTimelineTurn"
    ConversationTimelinePage:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - conversationId
        - itemsView
        - sortDirection
        - nextCursor
        - backwardsCursor
        - turns
      properties:
        deviceId:
          type: string
        conversationId:
          type: string
        itemsView:
          $ref: "#/components/schemas/TimelineItemsView"
        sortDirection:
          $ref: "#/components/schemas/TimelineSortDirection"
        nextCursor:
          type:
            - string
            - "null"
        backwardsCursor:
          type:
            - string
            - "null"
        turns:
          type: array
          items:
            $ref: "#/components/schemas/ConversationTimelineTurn"
    ConversationEvent:
      type: object
      additionalProperties: false
      required:
        - eventId
        - deviceId
        - timestamp
        - upstreamMethod
        - connectionId
        - sequence
        - conversationId
      properties:
        eventId:
          type: string
        deviceId:
          type: string
        timestamp:
          type: string
        upstreamMethod:
          type: string
        connectionId:
          type: string
        sequence:
          type: number
        conversationId:
          type: string
        projectId:
          type: string
        turnId:
          type: string
    ProbeCheckResult:
      type: object
      additionalProperties: false
      required:
        - name
        - ok
        - durationMs
      properties:
        name:
          type: string
        ok:
          type: boolean
        durationMs:
          type: number
        failureType:
          $ref: "#/components/schemas/ProbeFailureType"
        errorKind:
          type: string
        diagnosticId:
          type: string
        skippedReason:
          type: string
    WorkerProbeSummary:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - startedAt
        - completedAt
        - ok
        - mode
        - deviceId
        - codexVersion
        - appServer
        - checks
      properties:
        schemaVersion:
          type: number
        startedAt:
          type: string
        completedAt:
          type: string
        ok:
          type: boolean
        mode:
          $ref: "#/components/schemas/ProbeMode"
        deviceId:
          type: string
        codexVersion:
          type:
            - string
            - "null"
        appServer:
          type: object
          additionalProperties: false
          required:
            - transport
            - startedByWorker
            - readyz
          properties:
            transport:
              $ref: "#/components/schemas/AppServerTransport"
            startedByWorker:
              type: boolean
            readyz:
              type: boolean
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ProbeCheckResult"
    Device:
      type: object
      additionalProperties: false
      required:
        - id
        - icon
        - name
        - status
        - ip
        - lastOnlineAt
        - currentProject
        - model
      properties:
        id:
          type: string
        icon:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/DeviceConnectionStatus"
        ip:
          type: string
        lastOnlineAt:
          type: string
        currentProject:
          type: string
        model:
          type: string
    RemoteProject:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - deviceId
        - path
        - branch
        - hasChanges
        - pinned
      properties:
        id:
          type: string
        name:
          type: string
        deviceId:
          type: string
        path:
          type: string
        branch:
          type: string
        hasChanges:
          type: boolean
        pinned:
          type: boolean
        expanded:
          type: boolean
    CodexConversation:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - deviceId
        - projectName
        - status
        - updatedAt
        - summary
        - sandbox
        - approval
      properties:
        id:
          type: string
        title:
          type: string
        deviceId:
          type: string
        projectId:
          type: string
        projectName:
          type: string
        status:
          $ref: "#/components/schemas/ConversationStatus"
        updatedAt:
          type: string
        summary:
          type: string
        sandbox:
          type: string
        approval:
          type: string
        pinned:
          type: boolean
    BoardTask:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - status
        - linkedConversationIds
      properties:
        id:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        linkedConversationIds:
          type: array
          items:
            type: string
    DiffLine:
      type: object
      additionalProperties: false
      required:
        - line
        - kind
        - text
      properties:
        line:
          type: number
        kind:
          $ref: "#/components/schemas/DiffKind"
        text:
          type: string
    ConversationInputItem:
      type: object
      additionalProperties: false
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - text
        text:
          type: string
    FollowUpInput:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - input
      properties:
        deviceId:
          type: string
        projectId:
          type: string
        input:
          type: array
          items:
            $ref: "#/components/schemas/ConversationInputItem"
    CommandAccepted:
      type: object
      additionalProperties: false
      required:
        - commandId
        - acceptedAt
      properties:
        commandId:
          type: string
        acceptedAt:
          type: string
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: false
          properties:
            operation:
              type: string
            retryable:
              type: boolean
            diagnosticId:
              type: string
            reason:
              type: string
            field:
              type: string
            limit:
              type: number
        requestId:
          type: string
