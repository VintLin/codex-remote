        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: Caller is not allowed to access the requested worker resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConversationNotFoundError:
      description: The requested conversation timeline could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    TaskNotFoundError:
      description: The requested task could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    DeviceNotFoundError:
      description: The requested configured device could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RequestTimeoutError:
      description: Worker request timed out before a stable response was produced.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Request conflicts with an existing write command.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    AppServerUnavailableError:
      description: Worker could not reach the local Codex app-server dependency.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    DeviceUnavailableError:
      description: Control Plane could not reach the configured device Worker.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalWorkerError:
      description: Worker hit an unexpected internal failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
