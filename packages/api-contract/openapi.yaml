components:
  responses:
    BadRequestError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthorizedError:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: Caller is not allowed to access the requested worker resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConversationNotFoundError:
      description: The requested conversation timeline could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    TaskNotFoundError:
      description: The requested task could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    DeviceNotFoundError:
      description: The requested configured device could not be found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RequestTimeoutError:
      description: Worker request timed out before a stable response was produced.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Request conflicts with an existing write command.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    AppServerUnavailableError:
      description: Worker could not reach the local Codex app-server dependency.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    DeviceUnavailableError:
      description: Control Plane could not reach the configured device Worker.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalWorkerError:
      description: Worker hit an unexpected internal failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    DeviceConnectionStatus:
      type: string
      enum:
        - Connected
        - Not connected
    ConversationStatus:
      type: string
      enum:
        - running
        - waiting
        - done
        - failed
        - unknown
    TaskStatus:
      type: string
      enum:
        - in_progress
        - waiting
        - done
    DiffKind:
      type: string
      enum:
        - context
        - add
        - remove
    AppServerTransport:
      type: string
      enum:
        - loopbackWebSocket
        - stdio
        - unixSocket
    WorkerConnectionStatus:
      type: string
      enum:
        - connected
        - disconnected
        - degraded
        - unknown
    ControlPlaneHealth:
      type: object
      additionalProperties: false
      required:
        - status
        - checkedAt
        - deviceCount
        - connectedDeviceCount
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        checkedAt:
          type: string
          format: date-time
        deviceCount:
          type: number
        connectedDeviceCount:
          type: number
    ConversationRuntimeStatus:
      type: string
      enum:
        - not_loaded
        - idle
        - running
        - waiting_approval
        - waiting_input
        - unknown
    LatestTurnStatus:
      type: string
      enum:
        - completed
        - interrupted
        - failed
        - unknown
    TurnStatus:
      type: string
      enum:
        - in_progress
        - completed
        - interrupted
        - failed
        - unknown
    TimelineItemsView:
      type: string
      enum:
        - summary
        - full
    TimelineSortDirection:
      type: string
      enum:
        - asc
        - desc
    ProbeFailureType:
      type: string
      enum:
        - skipped
        - precondition_missing
        - env_not_configured
        - assertion_failed
        - opt_in_required
        - approval_unavailable
    ProbeMode:
      type: string
      enum:
        - readOnly
        - full
    WorkerHealth:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - status
        - checkedAt
        - codexVersion
        - appServer
      properties:
        deviceId:
          type: string
        status:
          $ref: "#/components/schemas/WorkerConnectionStatus"
        checkedAt:
          type: string
        codexVersion:
          type:
            - string
            - "null"
        appServer:
          type: object
          additionalProperties: false
          required:
            - transport
            - readyz
          properties:
            transport:
              $ref: "#/components/schemas/AppServerTransport"
            readyz:
              type: boolean
    WorkerCapabilities:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - canReadProjects
        - canReadConversations
        - canReadTimeline
        - canRunReadOnlyProbe
        - appServerTransport
        - supportedSourceKinds
      properties:
        deviceId:
          type: string
        canReadProjects:
          type: boolean
        canReadConversations:
          type: boolean
        canReadTimeline:
          type: boolean
        canRunReadOnlyProbe:
          type: boolean
        appServerTransport:
          $ref: "#/components/schemas/AppServerTransport"
        supportedSourceKinds:
          type: array
          items:
            type: string
    ConversationTimelineTurn:
      type: object
      additionalProperties: false
      required:
        - id
        - status
        - startedAt
        - completedAt
        - durationMs
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/TurnStatus"
        startedAt:
          type:
            - number
            - "null"
        completedAt:
          type:
            - number
            - "null"
        durationMs:
          type:
            - number
            - "null"
    ConversationTimeline:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - conversationId
        - readStartedAt
        - readCompletedAt
        - snapshotRevision
        - runtimeStatus
        - latestTurnStatus
        - turns
      properties:
        deviceId:
          type: string
        conversationId:
          type: string
        projectId:
          type: string
        readStartedAt:
          type: string
        readCompletedAt:
          type: string
        snapshotRevision:
          type: string
        runtimeStatus:
          $ref: "#/components/schemas/ConversationRuntimeStatus"
        latestTurnStatus:
          $ref: "#/components/schemas/LatestTurnStatus"
        loaded:
          type: boolean
        live:
          type: boolean
        archived:
          type: boolean
        turns:
          type: array
          items:
            $ref: "#/components/schemas/ConversationTimelineTurn"
        events:
          type: array
          items:
            $ref: "#/components/schemas/ConversationWorkbenchEvent"
    ConversationTimelinePage:
      type: object
      additionalProperties: false
      required:
        - deviceId
        - conversationId
        - itemsView
        - sortDirection
        - nextCursor
        - backwardsCursor
        - turns
      properties:
        deviceId:
          type: string
        conversationId:
          type: string
        itemsView:
          $ref: "#/components/schemas/TimelineItemsView"
        sortDirection:
          $ref: "#/components/schemas/TimelineSortDirection"
        nextCursor:
          type:
            - string
            - "null"
        backwardsCursor:
          type:
            - string
            - "null"
        turns:
          type: array
          items:
            $ref: "#/components/schemas/ConversationTimelineTurn"
    ConversationEvent:
      type: object
      additionalProperties: false
      required:
        - eventId
        - deviceId
        - timestamp
        - upstreamMethod
        - connectionId
        - sequence
        - conversationId
      properties:
        eventId:
          type: string
        deviceId:
          type: string
        timestamp:
          type: string
        upstreamMethod:
          type: string
        connectionId:
          type: string
        sequence:
          type: number
        conversationId:
          type: string
        projectId:
          type: string
        turnId:
          type: string
    ConversationApprovalCard:
      type: object
      additionalProperties: false
      required:
        - id
        - conversationId
        - turnId
        - itemId
        - kind
        - status
        - title
        - summary
        - risk
        - createdAt
      properties:
        id:
          type: string
        conversationId:
          type: string
        turnId:
          type: string
        itemId:
          type: string
        kind:
          type: string
          enum:
            - command_execution
            - file_change
            - legacy_exec
            - legacy_apply_patch
        status:
          type: string
          enum:
            - pending
            - resolved
        title:
          type: string
          maxLength: 120
        summary:
          type: string
          maxLength: 200
        risk:
          type: string
          enum:
            - low
            - medium
            - high
            - unknown
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
    ConversationWorkbenchEvent:
      type: object
      additionalProperties: false
      required:
        - eventId
        - seq
        - deviceId
        - conversationId
        - kind
        - createdAt
        - source
      properties:
        eventId:
          type: string
        seq:
          type: number
        deviceId:
          type: string
        conversationId:
          type: string
        kind:
          type: string
          enum:
            - thread_opened
            - thread_archived
            - thread_unarchived
            - thread_renamed
            - approval_pending
            - approval_resolved
            - snapshot_reset
            - turn_state
        createdAt:
          type: string
          format: date-time
        source:
          type: string
          enum:
            - snapshot
            - live
        gap:
          type: boolean
        approvalCard:
          $ref: "#/components/schemas/ConversationApprovalCard"
    ProbeCheckResult:
      type: object
      additionalProperties: false
      required:
        - name
        - ok
        - durationMs
      properties:
        name:
          type: string
        ok:
          type: boolean
        durationMs:
          type: number
        failureType:
          $ref: "#/components/schemas/ProbeFailureType"
        errorKind:
          type: string
        diagnosticId:
          type: string
        skippedReason:
          type: string
        exactCwdListProven:
          type: boolean
        completedUntilNextCursorNull:
          type: boolean
        pageCount:
          type: number
        cursorCount:
          type: number
        count:
          type: number
        reasonCode:
          type: string
    WorkerProbeSummary:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - startedAt
        - completedAt
        - ok
        - mode
        - deviceId
        - codexVersion
        - appServer
        - checks
      properties:
        schemaVersion:
          type: number
        startedAt:
          type: string
        completedAt:
          type: string
        ok:
          type: boolean
        mode:
          $ref: "#/components/schemas/ProbeMode"
        deviceId:
          type: string
        codexVersion:
          type:
            - string
            - "null"
        appServer:
          type: object
          additionalProperties: false
          required:
            - transport
            - startedByWorker
            - readyz
          properties:
            transport:
              $ref: "#/components/schemas/AppServerTransport"
            startedByWorker:
              type: boolean
            readyz:
              type: boolean
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ProbeCheckResult"
    Device:
      type: object
      additionalProperties: false
      required:
        - id
        - icon
        - name
        - status
        - ip
        - lastOnlineAt
        - currentProject
        - model
      properties:
        id:
          type: string
        icon:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/DeviceConnectionStatus"
        ip:
          type: string
        lastOnlineAt:
          type: string
        currentProject:
          type: string
        model:
          type: string
    RemoteProject:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - deviceId
        - path
        - branch
        - hasChanges
        - pinned
      properties:
        id:
          type: string
        name:
          type: string
        deviceId:
          type: string
        path:
          type: string
        branch:
          type: string
        hasChanges:
          type: boolean
        pinned:
          type: boolean
        expanded:
          type: boolean
    CodexConversation:
      type: object
      additionalProperties: false
